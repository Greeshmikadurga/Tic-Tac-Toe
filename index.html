<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Tic-Tac-Toe</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color-1: #ff00cc;
            --bg-color-2: #3333ff;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --x-color: #ffeb3b;
            --o-color: #00e5ff;
            --p1-color: #ff4757;
            --p2-color: #2ed573;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-panel {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2.5rem;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            width: 450px;
            max-width: 90vw;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.8);
        }

        h1 {
            color: white;
            margin-bottom: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Improved Credits Style for Visibility */
        .credits {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            letter-spacing: 0.5px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            z-index: 10;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Bottle Spin Screen */
        .spin-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 3rem 0;
            position: relative;
        }

        .player-label {
            color: white;
            font-size: 1.2rem;
            font-weight: 800;
            padding: 10px 20px;
            border-radius: 15px;
            background: rgba(0,0,0,0.2);
            transition: all 0.3s;
        }

        .player-label.p1 { border-left: 5px solid var(--p1-color); }
        .player-label.p2 { border-right: 5px solid var(--p2-color); }
        
        .active-label {
            transform: scale(1.2);
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.3);
        }

        .bottle-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #bottle {
            width: 100px;
            height: 100px;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3));
        }

        /* Selection Screen */
        .selection-title {
            color: white;
            margin-bottom: 2rem;
            font-size: 1.2rem;
            font-weight: 500;
        }

        .choice-container {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .choice-card {
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.1);
            border: 2px solid var(--glass-border);
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .choice-card:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-10px);
            border-color: white;
        }

        .choice-card svg { width: 50%; height: 50%; margin-bottom: 10px; }
        .choice-label { color: white; font-weight: bold; font-size: 0.9rem; }

        /* Board Styles */
        .status {
            color: white;
            margin-bottom: 2rem;
            font-size: 1.4rem;
            height: 2rem;
            font-weight: 600;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 2rem;
        }

        .cell {
            aspect-ratio: 1/1;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cell:hover:not(.taken) {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }

        .cell.taken { cursor: default; }
        .cell svg { width: 65%; height: 65%; }

        .path {
            stroke-dasharray: 200;
            stroke-dashoffset: 200;
            animation: draw 0.6s ease-out forwards;
        }
        @keyframes draw { to { stroke-dashoffset: 0; } }

        button {
            padding: 14px 32px;
            border: none;
            border-radius: 50px;
            background: white;
            color: #333;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            text-transform: uppercase;
        }

        button:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.25); }

        .winning-cell {
            background: rgba(255, 255, 255, 0.4) !important;
            animation: pulse 0.8s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); box-shadow: 0 0 20px white; }
        }

        #result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .result-card {
            background: white;
            padding: 3rem;
            border-radius: 32px;
            text-align: center;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn { from { transform: scale(0.3); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .result-card h2 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        #spinStatus {
            color: white;
            font-weight: bold;
            margin-top: 10px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <!-- Static Credits Line with Pill Background -->
    <div class="credits">Created by Greeshmika Durga and Lalitha Snehitha</div>

    <!-- Screen 1: Bottle Spin -->
    <div id="spinScreen" class="glass-panel">
        <h1>First Move</h1>
        <p style="color: white; margin-top: -10px;">Tap the bottle to decide who picks!</p>
        
        <div class="spin-container">
            <div class="player-label p1" id="labelP1">Player 1</div>
            
            <div class="bottle-wrapper" onclick="spinBottle()">
                <svg id="bottle" viewBox="0 0 100 100">
                    <!-- Bottle Body -->
                    <path d="M40 90 L60 90 L60 40 C60 30, 55 25, 55 10 L45 10 C45 25, 40 30, 40 40 Z" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
                    <!-- Bottle Label -->
                    <rect x="42" y="50" width="16" height="20" fill="rgba(255,255,255,0.3)" rx="2"/>
                    <!-- Cap -->
                    <rect x="44" y="5" width="12" height="5" fill="#e74c3c" rx="1"/>
                </svg>
            </div>

            <div class="player-label p2" id="labelP2">Player 2</div>
        </div>
        
        <div id="spinStatus">Waiting for spin...</div>
    </div>

    <!-- Screen 2: Selection -->
    <div id="selectionScreen" class="glass-panel hidden">
        <h1>Selection</h1>
        <p id="selectionInstruction" class="selection-title">...</p>
        <div class="choice-container">
            <div class="choice-card" onclick="startGameWith('X')">
                <svg viewBox="0 0 100 100">
                    <line x1="20" y1="20" x2="80" y2="80" stroke="var(--x-color)" stroke-width="12" stroke-linecap="round" />
                    <line x1="80" y1="20" x2="20" y2="80" stroke="var(--x-color)" stroke-width="12" stroke-linecap="round" />
                </svg>
                <span class="choice-label">SIDE X</span>
            </div>
            <div class="choice-card" onclick="startGameWith('O')">
                <svg viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="35" stroke="var(--o-color)" stroke-width="10" fill="none" stroke-linecap="round" />
                </svg>
                <span class="choice-label">SIDE O</span>
            </div>
        </div>
    </div>

    <!-- Screen 3: Game -->
    <div id="gameScreen" class="glass-panel hidden">
        <h1>Tic Tac Toe</h1>
        <div class="status" id="statusText">...</div>
        
        <div class="board" id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="controls">
            <button id="resetBtn">Main Menu</button>
        </div>
    </div>

    <!-- Result Modal -->
    <div id="result-overlay">
        <div class="result-card">
            <h2 id="winnerText">Player 1 Wins!</h2>
            <button id="overlayResetBtn">Play Again</button>
        </div>
    </div>

    <script>
        const spinScreen = document.getElementById('spinScreen');
        const selectionScreen = document.getElementById('selectionScreen');
        const gameScreen = document.getElementById('gameScreen');
        const bottle = document.getElementById('bottle');
        const spinStatus = document.getElementById('spinStatus');
        const labelP1 = document.getElementById('labelP1');
        const labelP2 = document.getElementById('labelP2');
        const selectionInstruction = document.getElementById('selectionInstruction');
        
        const cells = document.querySelectorAll('.cell');
        const statusText = document.getElementById('statusText');
        const resetBtn = document.getElementById('resetBtn');
        const overlayResetBtn = document.getElementById('overlayResetBtn');
        const resultOverlay = document.getElementById('result-overlay');
        const winnerText = document.getElementById('winnerText');

        let isSpinning = false;
        let spinWinner = null; // 1 or 2
        let player1Symbol = 'X';
        let player2Symbol = 'O';
        let currentActiveSymbol = 'X'; 
        let gameState = ["", "", "", "", "", "", "", "", ""];
        let gameActive = false;

        const winningConditions = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        // --- SCREEN 1: SPIN LOGIC ---

        function spinBottle() {
            if (isSpinning) return;
            isSpinning = true;
            spinStatus.innerText = "Spinning...";
            
            spinWinner = Math.random() > 0.5 ? 1 : 2;
            
            const baseRotations = 5 + Math.floor(Math.random() * 5); 
            const targetAngle = spinWinner === 1 ? 270 : 90;
            const finalRotation = (baseRotations * 360) + targetAngle;
            
            bottle.style.transform = `rotate(${finalRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                const winnerLabel = spinWinner === 1 ? labelP1 : labelP2;
                winnerLabel.classList.add('active-label');
                spinStatus.innerText = `Landed on Player ${spinWinner}!`;
                
                confetti({
                    particleCount: 40,
                    spread: 60,
                    origin: { x: spinWinner === 1 ? 0.2 : 0.8, y: 0.5 }
                });

                setTimeout(() => {
                    showSelectionScreen();
                }, 1500);
            }, 4000);
        }

        function showSelectionScreen() {
            spinScreen.classList.add('hidden');
            selectionScreen.classList.remove('hidden');
            selectionInstruction.innerText = `Player ${spinWinner}, choose your side:`;
        }

        // --- SCREEN 2: SELECTION LOGIC ---

        function startGameWith(symbol) {
            if (spinWinner === 1) {
                player1Symbol = symbol;
                player2Symbol = (symbol === 'X') ? 'O' : 'X';
            } else {
                player2Symbol = symbol;
                player1Symbol = (symbol === 'X') ? 'O' : 'X';
            }
            
            selectionScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            
            resetGameState();
        }

        // --- SCREEN 3: GAME LOGIC ---

        const xIcon = `
            <svg viewBox="0 0 100 100">
                <line class="path" x1="20" y1="20" x2="80" y2="80" stroke="var(--x-color)" stroke-width="12" stroke-linecap="round" />
                <line class="path" x1="80" y1="20" x2="20" y2="80" stroke="var(--x-color)" stroke-width="12" stroke-linecap="round" style="animation-delay: 0.2s" />
            </svg>
        `;

        const oIcon = `
            <svg viewBox="0 0 100 100">
                <circle class="path" cx="50" cy="50" r="35" stroke="var(--o-color)" stroke-width="10" fill="none" stroke-linecap="round" />
            </svg>
        `;

        function resetGameState() {
            currentActiveSymbol = 'X'; 
            gameState = ["", "", "", "", "", "", "", "", ""];
            gameActive = true;
            updateStatusDisplay();
            
            cells.forEach(cell => {
                cell.innerHTML = "";
                cell.classList.remove('taken', 'winning-cell');
            });
            resultOverlay.style.display = 'none';
        }

        function updateStatusDisplay() {
            const playerName = (currentActiveSymbol === player1Symbol) ? "Player 1" : "Player 2";
            statusText.innerText = `${playerName} (${currentActiveSymbol})'s Turn`;
        }

        function fireCelebration() {
            const duration = 5 * 1000;
            const end = Date.now() + duration;

            // (1) Raining continuous pieces from the sides
            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60, spread: 55, origin: { x: 0, y: 0.6 },
                    colors: ['#ff00cc', '#3333ff', '#ffeb3b', '#00e5ff']
                });
                confetti({
                    particleCount: 3,
                    angle: 120, spread: 55, origin: { x: 1, y: 0.6 },
                    colors: ['#ff00cc', '#3333ff', '#ffeb3b', '#00e5ff']
                });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());

            // (2) Massive Central Explosion to fill the middle
            confetti({
                particleCount: 250,
                spread: 120,
                origin: { x: 0.5, y: 0.4 }, // Centered and slightly higher for better fall
                gravity: 1,
                scalar: 1.5,
                colors: ['#ff00cc', '#3333ff', '#ffeb3b', '#00e5ff', '#ffffff']
            });

            // (3) Beefy Bottom Side Pops
            confetti({ 
                particleCount: 150, 
                spread: 90, 
                origin: { y: 1, x: 0 }, 
                gravity: 1.2, 
                scalar: 1.2 
            });
            confetti({ 
                particleCount: 150, 
                spread: 90, 
                origin: { y: 1, x: 1 }, 
                gravity: 1.2, 
                scalar: 1.2 
            });
            
            // (4) Extra Random Bursts
            setTimeout(() => {
                confetti({
                    particleCount: 100,
                    angle: 90,
                    spread: 360,
                    origin: { x: 0.5, y: 0.5 },
                    scalar: 0.8
                });
            }, 400);
        }

        function handleCellClick(e) {
            const clickedCell = e.target.closest('.cell');
            if (!clickedCell || !gameActive) return;

            const cellIndex = parseInt(clickedCell.getAttribute('data-index'));
            if (gameState[cellIndex] !== "") return;

            gameState[cellIndex] = currentActiveSymbol;
            clickedCell.classList.add('taken');
            clickedCell.innerHTML = currentActiveSymbol === 'X' ? xIcon : oIcon;

            checkResult();
        }

        function checkResult() {
            let roundWon = false;
            let winningLine = null;

            for (let i = 0; i < winningConditions.length; i++) {
                const [a, b, c] = winningConditions[i];
                if (gameState[a] && gameState[a] === gameState[b] && gameState[a] === gameState[c]) {
                    roundWon = true;
                    winningLine = [a, b, c];
                    break;
                }
            }

            if (roundWon) {
                gameActive = false;
                const winnerName = (currentActiveSymbol === player1Symbol) ? "Player 1" : "Player 2";
                statusText.innerText = `${winnerName} Wins!`;
                winningLine.forEach(index => cells[index].classList.add('winning-cell'));
                
                fireCelebration();
                setTimeout(() => showResult(`${winnerName} Won!`), 1000);
                return;
            }

            if (!gameState.includes("")) {
                gameActive = false;
                statusText.innerText = "It's a Draw!";
                setTimeout(() => showResult("It's a Draw!"), 500);
                return;
            }

            currentActiveSymbol = currentActiveSymbol === 'X' ? 'O' : 'X';
            updateStatusDisplay();
        }

        function showResult(text) {
            winnerText.innerText = text;
            resultOverlay.style.display = 'flex';
        }

        function goToMainMenu() {
            gameScreen.classList.add('hidden');
            selectionScreen.classList.add('hidden');
            spinScreen.classList.remove('hidden');
            resultOverlay.style.display = 'none';
            
            bottle.style.transition = 'none';
            bottle.style.transform = 'rotate(0deg)';
            setTimeout(() => bottle.style.transition = 'transform 4s cubic-bezier(0.15, 0, 0.15, 1)', 50);
            
            labelP1.classList.remove('active-label');
            labelP2.classList.remove('active-label');
            spinStatus.innerText = "Waiting for spin...";
            isSpinning = false;
        }

        cells.forEach(cell => cell.addEventListener('click', handleCellClick));
        resetBtn.addEventListener('click', goToMainMenu);
        overlayResetBtn.addEventListener('click', resetGameState);
    </script>
</body>
</html>
